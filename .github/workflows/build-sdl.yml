name: Build SDL

on:
  workflow_dispatch:
  push:
    paths:
      - 'vendor/SDL/**'
      - '.github/workflows/build-sdl.yml'

jobs:
  build-desktop:
    name: SDL · ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-2025
            vs_arch: x64

          - rid: win-arm64
            os: windows-11-arm
            vs_arch: ARM64

          - rid: osx-x64
            os: macos-15-intel
            cmake_osx: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

          - rid: osx-arm64
            os: macos-latest
            cmake_osx: -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

          - rid: linux-x64
            os: ubuntu-22.04

          - rid: linux-arm64
            os: ubuntu-22.04-arm

    env:
      BUILD_DIR: ${{ github.workspace }}/_build/SDL
      INSTALL_DIR: ${{ github.workspace }}/_install

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libasound2-dev libpulse-dev libjack-dev libsndio-dev \
            libusb-1.0-0-dev libdbus-1-dev libudev-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev libxrender-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
            libdrm-dev libgbm-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libpipewire-0.3-dev libvulkan-dev

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S vendor/SDL -B $env:BUILD_DIR `
            -G "Visual Studio 17 2022" -A "${{ matrix.vs_arch }}" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:INSTALL_DIR" `
            -DSDL_SHARED=ON -DSDL_STATIC=ON `
            -DSDL_INSTALL=ON -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S vendor/SDL -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DSDL_SHARED=ON -DSDL_STATIC=ON \
            -DSDL_INSTALL=ON -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF \
            ${{ matrix.cmake_osx || '' }}

      - name: Build
        run: cmake --build "${{ env.BUILD_DIR }}" --config Release --parallel

      - name: Install
        run: cmake --install "${{ env.BUILD_DIR }}" --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SDL-${{ matrix.rid }}
          path: ${{ env.INSTALL_DIR }}
          retention-days: 90

  build-wasm:
    name: SDL · browser-wasm
    runs-on: ubuntu-22.04

    env:
      RID: browser-wasm
      BUILD_DIR: ${{ github.workspace }}/_build/SDL
      INSTALL_DIR: ${{ github.workspace }}/_install

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build python3

      - name: Setup Emscripten
        run: |
          cd vendor/emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Configure (Emscripten)
        run: |
          source vendor/emsdk/emsdk_env.sh
          emcmake cmake -S vendor/SDL -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DBUILD_SHARED_LIBS=OFF \
            -DSDL_SHARED=OFF -DSDL_STATIC=ON \
            -DSDL_INSTALL=ON -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF \
            -DSDL_AUDIO=ON \
            -DSDL_VIDEO=ON \
            -DSDL_RENDER=ON \
            -DSDL_JOYSTICK=ON \
            -DSDL_HAPTIC=ON \
            -DSDL_HIDAPI=OFF \
            -DSDL_SENSOR=OFF

      - name: Build
        run: |
          source vendor/emsdk/emsdk_env.sh
          cmake --build "$BUILD_DIR" --config Release --parallel

      - name: Install
        run: |
          source vendor/emsdk/emsdk_env.sh
          cmake --install "$BUILD_DIR" --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SDL-browser-wasm
          path: ${{ env.INSTALL_DIR }}
          retention-days: 90

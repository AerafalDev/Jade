name: Build SDL

on:
  workflow_dispatch:
  push:
    paths:
      - 'vendor/SDL/**'
      - '.github/workflows/build-sdl.yml'

jobs:
  build-desktop:
    name: SDL · ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-2025
            vs_arch: x64

          - rid: win-arm64
            os: windows-11-arm
            vs_arch: ARM64

          - rid: osx-x64
            os: macos-15-intel
            cmake_osx: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

          - rid: osx-arm64
            os: macos-latest
            cmake_osx: -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0

          - rid: linux-x64
            os: ubuntu-22.04

          - rid: linux-arm64
            os: ubuntu-22.04-arm

    env:
      OUTPUT_DIR: ${{ github.workspace }}/src/Jade.Native/runtimes/${{ matrix.rid }}/native
      BUILD_DIR: ${{ github.workspace }}/_build/SDL
      INSTALL_DIR: ${{ github.workspace }}/_install

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libasound2-dev libpulse-dev libjack-dev libsndio-dev \
            libusb-1.0-0-dev libdbus-1-dev libudev-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev libxrender-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
            libdrm-dev libgbm-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev \
            libpipewire-0.3-dev libvulkan-dev

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          cmake -S vendor/SDL -B $env:BUILD_DIR `
            -G "Visual Studio 17 2022" -A "${{ matrix.vs_arch }}" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:INSTALL_DIR" `
            -DSDL_SHARED=ON -DSDL_STATIC=ON `
            -DSDL_INSTALL=ON -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF

      - name: Configure (Unix)
        if: runner.os != 'Windows'
        run: |
          cmake -S vendor/SDL -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DSDL_SHARED=ON -DSDL_STATIC=ON \
            -DSDL_INSTALL=ON -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF \
            ${{ matrix.cmake_osx || '' }}

      - name: Build
        run: cmake --build "${{ env.BUILD_DIR }}" --config Release --parallel

      - name: Install
        run: cmake --install "${{ env.BUILD_DIR }}" --config Release

      - name: Copy libs to runtimes dir
        shell: bash
        run: |
          mkdir -p "$OUTPUT_DIR"

          find "$INSTALL_DIR" \
            \( -name "SDL3.dll" -o -name "SDL3.lib" -o -name "SDL3-static.lib" \) \
            -exec cp {} "$OUTPUT_DIR/" \; 2>/dev/null || true

          find "$INSTALL_DIR" \
            \( -name "libSDL3.so*" -o -name "libSDL3.dylib" \) \
            -exec cp -P {} "$OUTPUT_DIR/" \; 2>/dev/null || true

          find "$INSTALL_DIR" \
            \( -name "libSDL3.a" -o -name "libSDL3-static.a" \) \
            -exec cp {} "$OUTPUT_DIR/" \; 2>/dev/null || true

          echo "=== Output files ==="
          ls -la "$OUTPUT_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SDL-${{ matrix.rid }}
          path: src/Jade.Native/runtimes/${{ matrix.rid }}/native/

  build-wasm:
    name: SDL · browser-wasm
    runs-on: ubuntu-22.04

    env:
      RID: browser-wasm
      OUTPUT_DIR: ${{ github.workspace }}/src/Jade.Native/runtimes/browser-wasm/native
      BUILD_DIR: ${{ github.workspace }}/_build/SDL
      INSTALL_DIR: ${{ github.workspace }}/_install

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system deps
        run: |
          sudo apt-get update -y
          sudo apt-get install -y cmake ninja-build python3

      - name: Setup Emscripten
        run: |
          cd vendor/emsdk
          ./emsdk install latest
          ./emsdk activate latest

      - name: Configure (Emscripten)
        run: |
          source vendor/emsdk/emsdk_env.sh
          emcmake cmake -S vendor/SDL -B "$BUILD_DIR" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DBUILD_SHARED_LIBS=OFF \
            -DSDL_SHARED=OFF -DSDL_STATIC=ON \
            -DSDL_INSTALL=ON -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF \
            -DSDL_AUDIO=ON \
            -DSDL_VIDEO=ON \
            -DSDL_RENDER=ON \
            -DSDL_JOYSTICK=ON \
            -DSDL_HAPTIC=ON \
            -DSDL_HIDAPI=OFF \
            -DSDL_SENSOR=OFF

      - name: Build
        run: |
          source vendor/emsdk/emsdk_env.sh
          cmake --build "$BUILD_DIR" --config Release --parallel

      - name: Install
        run: |
          source vendor/emsdk/emsdk_env.sh
          cmake --install "$BUILD_DIR" --config Release

      - name: Copy static libs
        run: |
          mkdir -p "$OUTPUT_DIR"
          find "$INSTALL_DIR" -name "*.a" -exec cp {} "$OUTPUT_DIR/" \;
          ls -la "$OUTPUT_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SDL-browser-wasm
          path: src/Jade.Native/runtimes/browser-wasm/native/

  collect:
    name: Collect all SDL artifacts
    runs-on: ubuntu-latest
    needs: [build-desktop, build-wasm]

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: src/Jade.Native/runtimes/

      - name: Flatten artifact directories
        shell: bash
        run: |
          cd src/Jade.Native/runtimes
          for artifact_dir in SDL-*/; do
            rid="${artifact_dir#SDL-}"
            rid="${rid%/}"
            mkdir -p "$rid/native"
            cp -r "$artifact_dir"* "$rid/native/" 2>/dev/null || true
            rm -rf "$artifact_dir"
          done
          echo "=== Final structure ==="
          find . -type f | sort

      - name: Upload combined artifact
        uses: actions/upload-artifact@v7
        with:
          name: SDL-all-runtimes
          path: src/Jade.Native/runtimes/
          retention-days: 90

name: Build SDL_shadercross

on:
  workflow_dispatch:
  push:
    paths:
      - 'vendor/SDL_shadercross/**'
      - 'vendor/SDL/**'
      - 'vendor/SPIRV-Cross/**'
      - '.github/workflows/build-sdl_shadercross.yml'

jobs:
  build:
    name: SDL_shadercross · ${{ matrix.rid }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - rid: win-x64
            os: windows-2025
            vs_arch: x64
            host_os: Windows

          - rid: win-arm64
            os: windows-11-arm
            vs_arch: ARM64
            host_os: Windows

          - rid: osx-x64
            os: macos-15-intel
            cmake_osx: -DCMAKE_OSX_ARCHITECTURES=x86_64 -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
            host_os: macOS

          - rid: osx-arm64
            os: macos-latest
            cmake_osx: -DCMAKE_OSX_ARCHITECTURES=arm64 -DCMAKE_OSX_DEPLOYMENT_TARGET=12.0
            host_os: macOS

          - rid: linux-x64
            os: ubuntu-22.04
            host_os: Linux

          - rid: linux-arm64
            os: ubuntu-22.04-arm
            host_os: Linux

    env:
      BUILD_SDL: ${{ github.workspace }}/_build/SDL
      BUILD_SPVC: ${{ github.workspace }}/_build/SPIRV-Cross
      BUILD_SC: ${{ github.workspace }}/_build/SDL_shadercross
      INSTALL_DIR: ${{ github.workspace }}/_install

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Linux deps
        if: matrix.host_os == 'Linux'
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libasound2-dev libpulse-dev libjack-dev \
            libusb-1.0-0-dev libdbus-1-dev libudev-dev \
            libx11-dev libxext-dev libxrandr-dev libxcursor-dev \
            libxfixes-dev libxi-dev libxss-dev libxtst-dev libxrender-dev \
            libwayland-dev wayland-protocols libxkbcommon-dev libdecor-0-dev \
            libgl1-mesa-dev libegl1-mesa-dev libgles2-mesa-dev libvulkan-dev \
            libdrm-dev libgbm-dev

      - name: Download DXC binaries (Windows)
        if: matrix.host_os == 'Windows'
        shell: pwsh
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"
          $headers = @{
            "User-Agent" = "Jade-CI"
            "Accept" = "application/vnd.github+json"
            "X-GitHub-Api-Version" = "2022-11-28"
            "Authorization" = "Bearer $env:GITHUB_TOKEN"
          }
          $release = Invoke-RestMethod `
            -Uri "https://api.github.com/repos/microsoft/DirectXShaderCompiler/releases/latest" `
            -Headers $headers
          $asset = $release.assets |
            Where-Object { $_.name -like 'dxc_*.zip' -and $_.name -notlike 'pdb_*' } |
            Select-Object -First 1
          if (-not $asset) { throw "DXC zip asset not found" }

          $destRoot = Join-Path $env:GITHUB_WORKSPACE "vendor/SDL_shadercross/external/DirectXShaderCompiler-binaries"
          $zipPath = Join-Path $env:RUNNER_TEMP $asset.name
          New-Item -ItemType Directory -Force -Path $destRoot | Out-Null
          Write-Host "Downloading $($asset.browser_download_url)"
          Invoke-WebRequest -Uri $asset.browser_download_url -OutFile $zipPath
          Expand-Archive -Path $zipPath -DestinationPath $destRoot -Force

          $top = Get-ChildItem -Path $destRoot -Directory -Filter "dxc_*" | Select-Object -First 1
          if ($top -and (Test-Path (Join-Path $top.FullName "bin"))) {
            Get-ChildItem -Path $top.FullName -Force |
              ForEach-Object { Move-Item -Path $_.FullName -Destination $destRoot -Force }
            Remove-Item -Path $top.FullName -Recurse -Force
          }
          if (!(Test-Path (Join-Path $destRoot "bin"))) { throw "DXC bin/ missing" }
          Write-Host "DXC ready at $destRoot"

      - name: Configure SDL (Windows)
        if: matrix.host_os == 'Windows'
        shell: pwsh
        run: |
          cmake -S vendor/SDL -B $env:BUILD_SDL `
            -G "Visual Studio 17 2022" -A "${{ matrix.vs_arch }}" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:INSTALL_DIR" `
            -DSDL_INSTALL=ON -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF `
            -DSDL_VIDEO=ON -DSDL_RENDER=ON -DSDL_GPU=ON

      - name: Configure SDL (Unix)
        if: matrix.host_os != 'Windows'
        run: |
          cmake -S vendor/SDL -B "$BUILD_SDL" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DSDL_INSTALL=ON -DSDL_TESTS=OFF -DSDL_EXAMPLES=OFF \
            -DSDL_VIDEO=ON -DSDL_RENDER=ON -DSDL_GPU=ON \
            ${{ matrix.cmake_osx || '' }}

      - name: Build & Install SDL
        run: |
          cmake --build "${{ env.BUILD_SDL }}" --config Release --parallel
          cmake --install "${{ env.BUILD_SDL }}" --config Release

      - name: Configure SPIRV-Cross (Windows)
        if: matrix.host_os == 'Windows'
        shell: pwsh
        run: |
          cmake -S vendor/SPIRV-Cross -B $env:BUILD_SPVC `
            -G "Visual Studio 17 2022" -A "${{ matrix.vs_arch }}" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:INSTALL_DIR" `
            -DSPIRV_CROSS_SHARED=ON `
            -DSPIRV_CROSS_STATIC=OFF `
            -DSPIRV_CROSS_CLI=OFF `
            -DSPIRV_CROSS_ENABLE_TESTS=OFF

      - name: Configure SPIRV-Cross (Unix)
        if: matrix.host_os != 'Windows'
        run: |
          cmake -S vendor/SPIRV-Cross -B "$BUILD_SPVC" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DSPIRV_CROSS_SHARED=ON \
            -DSPIRV_CROSS_STATIC=OFF \
            -DSPIRV_CROSS_CLI=OFF \
            -DSPIRV_CROSS_ENABLE_TESTS=OFF \
            ${{ matrix.cmake_osx || '' }}

      - name: Build & Install SPIRV-Cross
        run: |
          cmake --build "${{ env.BUILD_SPVC }}" --config Release --parallel
          cmake --install "${{ env.BUILD_SPVC }}" --config Release

      - name: Configure SDL_shadercross (Windows)
        if: matrix.host_os == 'Windows'
        shell: pwsh
        run: |
          cmake -S vendor/SDL_shadercross -B $env:BUILD_SC `
            -G "Visual Studio 17 2022" -A "${{ matrix.vs_arch }}" `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_INSTALL_PREFIX="$env:INSTALL_DIR" `
            -DCMAKE_PREFIX_PATH="$env:INSTALL_DIR" `
            -DSDLSHADERCROSS_SHARED=ON `
            -DSDLSHADERCROSS_STATIC=ON `
            -DSDLSHADERCROSS_CLI=ON `
            -DSDLSHADERCROSS_DXC=ON `
            -DSDLSHADERCROSS_SPIRVCROSS_SHARED=ON `
            -DSDLSHADERCROSS_VENDORED=OFF `
            -DSDLSHADERCROSS_INSTALL=ON `
            -DSDLSHADERCROSS_WERROR=OFF

      - name: Configure SDL_shadercross (Unix)
        if: matrix.host_os != 'Windows'
        run: |
          cmake -S vendor/SDL_shadercross -B "$BUILD_SC" \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_INSTALL_PREFIX="$INSTALL_DIR" \
            -DCMAKE_PREFIX_PATH="$INSTALL_DIR" \
            -DSDLSHADERCROSS_SHARED=ON \
            -DSDLSHADERCROSS_STATIC=ON \
            -DSDLSHADERCROSS_CLI=ON \
            -DSDLSHADERCROSS_DXC=OFF \
            -DSDLSHADERCROSS_SPIRVCROSS_SHARED=ON \
            -DSDLSHADERCROSS_VENDORED=OFF \
            -DSDLSHADERCROSS_INSTALL=ON \
            -DSDLSHADERCROSS_WERROR=OFF \
            ${{ matrix.cmake_osx || '' }}

      - name: Build & Install SDL_shadercross
        run: |
          cmake --build "${{ env.BUILD_SC }}" --config Release --parallel
          cmake --install "${{ env.BUILD_SC }}" --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: SDL_shadercross-${{ matrix.rid }}
          path: ${{ env.INSTALL_DIR }}
          retention-days: 90
